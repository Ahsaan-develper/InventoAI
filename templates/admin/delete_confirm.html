{% extends 'admin/base_admin.html' %}

{% block title %}Delete Item{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-slate-900 rounded-2xl shadow-xl shadow-red-900/10 border border-red-900/50 overflow-hidden p-8 text-center">
        <div class="w-16 h-16 bg-red-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        
        <h2 class="text-2xl font-bold text-white mb-2">Delete Item?</h2>
        <p class="text-blue-300 mb-6">Are you sure you want to delete <span class="text-white font-semibold">"{{ item.title }}"</span>? This action cannot be undone.</p>

        <form method="post" class="flex gap-4">
            {% csrf_token %}
            <button type="submit" 
                class="flex-1 bg-red-600 hover:bg-red-500 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 shadow-lg shadow-red-900/50">
                Yes, Delete
            </button>
            <a href="{% url 'show_items' %}" 
                class="flex-1 bg-slate-800 hover:bg-slate-700 text-blue-300 font-semibold py-3 px-4 rounded-lg transition duration-200 text-center border border-slate-700">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
