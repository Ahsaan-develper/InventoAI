{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %} | Invento AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-white">

    <!-- Navbar -->
    <nav class="bg-slate-900 border-b border-blue-900/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                
                <!-- Left: Logo -->
                <div class="flex-shrink-0">
                    <a href="{% url 'admin_dashboard' %}" class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                        <span class="text-xl font-bold text-white tracking-tight">Invento AI <span class="text-blue-400 font-normal">Admin</span></span>
                    </a>
                </div>

                <!-- Center: Navigation -->
                <div class="hidden md:block absolute left-1/2 transform -translate-x-1/2">
                    <div class="flex items-baseline space-x-4">
                        <a href="{% url 'add_items' %}" 
                           class="{% if request.resolver_match.url_name == 'add_items' %}bg-blue-600 text-white{% else %}text-blue-300 hover:bg-slate-800 hover:text-white{% endif %} px-4 py-2 rounded-lg text-sm font-medium transition duration-200 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            Add Items
                        </a>
                        <a href="{% url 'show_items' %}" 
                           class="{% if request.resolver_match.url_name == 'show_items' %}bg-blue-600 text-white{% else %}text-blue-300 hover:bg-slate-800 hover:text-white{% endif %} px-4 py-2 rounded-lg text-sm font-medium transition duration-200 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                            </svg>
                            Show Items
                        </a>
                        <a href="{% url 'agent_interface' %}" 
                           class="{% if request.resolver_match.url_name == 'agent_interface' %}bg-purple-600 text-white{% else %}text-purple-300 hover:bg-slate-800 hover:text-white{% endif %} px-4 py-2 rounded-lg text-sm font-medium transition duration-200 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                            </svg>
                            AI Chatbot
                        </a>
                    </div>
                </div>

                <!-- Right: Logout -->
                <div class="flex items-center gap-4 ml-auto">
                    <span class="text-sm text-blue-300 hidden sm:block">{{ request.user.username }}</span>
                    <a href="{% url 'logout' %}" 
                       class="bg-red-600/20 hover:bg-red-600/40 text-red-400 hover:text-red-300 px-4 py-2 rounded-lg text-sm font-medium transition duration-200 flex items-center gap-2 border border-red-800/50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                        </svg>
                        Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% if messages %}
            {% for message in messages %}
                <div class="mb-6 p-4 rounded-lg {% if message.tags == 'success' %}bg-emerald-900/50 text-emerald-300 border border-emerald-800{% else %}bg-red-900/50 text-red-300 border border-red-800{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>

</body>
</html>
