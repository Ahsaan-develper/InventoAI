{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — InventoAI</title>
    <meta name="description" content="Log in to your InventoAI account to manage your inventory with AI-powered insights.">
    <link rel="stylesheet" href="{% static 'css/landing.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

    <div class="auth-page">
        <!-- Background Effects -->
        <div class="auth-page__bg">
            <div class="auth-page__orb auth-page__orb--1"></div>
            <div class="auth-page__orb auth-page__orb--2"></div>
        </div>
        <div class="auth-page__grid"></div>

        <!-- Auth Card -->
        <div class="auth-card" id="login-card">
            <!-- Logo -->
            <div class="auth-card__header">
                <a href="{% url 'landing' %}" class="auth-card__logo" id="login-logo">
                    <div class="auth-card__logo-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                            <line x1="12" y1="22.08" x2="12" y2="12"/>
                        </svg>
                    </div>
                    Invento<span>AI</span>
                </a>
                <h1 class="auth-card__title" id="login-title">Welcome Back</h1>
                <p class="auth-card__subtitle">Don't have an account? <a href="{% url 'signup' %}" id="login-signup-link">Sign up</a></p>
            </div>

            <!-- Messages -->
            {% if messages %}
            <div class="auth-messages">
                {% for message in messages %}
                <div class="auth-message auth-message--{{ message.tags }}" id="login-msg-{{ forloop.counter }}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <!-- Login Form -->
            <form class="auth-form" method="POST" action="{% url 'login' %}" id="login-form">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-group__label" for="login-username">Username</label>
                    <input
                        type="text"
                        class="form-group__input"
                        id="login-username"
                        name="username"
                        placeholder="Enter your username"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-group__label" for="login-password">Password</label>
                    <input
                        type="password"
                        class="form-group__input"
                        id="login-password"
                        name="password"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="auth-form__submit" id="login-submit-btn">
                    Log In
                </button>
            </form>

            <!-- Back to home -->
            <a href="{% url 'landing' %}" class="auth-back" id="login-back-home">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to home
            </a>
        </div>
    </div>

</body>
</html>
