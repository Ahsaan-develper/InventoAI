<!-- InventoAI — Navbar / Header Component -->
<nav class="navbar" id="navbar">
    <div class="container">
        <!-- Logo -->
        <a href="{% url 'landing' %}" class="navbar__logo" id="nav-logo">
            <div class="navbar__logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                    <line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
            </div>
            Invento<span>AI</span>
        </a>

        <!-- Navigation Links -->
        <div class="navbar__links" id="nav-links">
            <a href="{% url 'landing' %}#features" id="nav-features">Features</a>
            <a href="{% url 'landing' %}#hero" id="nav-how">How It Works</a>
            <a href="{% url 'landing' %}#contact" id="nav-pricing">Pricing</a>
            <a href="{% url 'landing' %}#contact" id="nav-contact">Contact</a>
        </div>

        <!-- Action Buttons -->
        <div class="navbar__actions" id="nav-actions">
            {% if user.is_authenticated %}
                <span class="btn btn--ghost" style="cursor: default; opacity: 0.85;">Hi, {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn--primary" id="nav-logout-btn">Log Out</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn--ghost" id="nav-login-btn">Log In</a>
                <a href="{% url 'signup' %}" class="btn btn--primary" id="nav-signup-btn">Get Started</a>
            {% endif %}
        </div>

        <!-- Mobile Menu Toggle -->
        <button class="navbar__toggle" id="nav-toggle" aria-label="Toggle navigation menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</nav>
